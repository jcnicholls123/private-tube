services:
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    ports:
      - "30094:8081"
    environment:
      UID: "1026"
      GID: "100"
      UMASK: "022"
    volumes:
      # Change this to your Synology downloads folder.
      - /volume1/docker/metube/downloads:/downloads

  private-tube:
    image: ghcr.io/jcnicholls123/private-tube:latest
    container_name: private-tube
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      PORT: "3020"
      MEDIA_DIR: /media
      DATA_DIR: /data
      AUTH_ENABLED: "true"
      METUBE_URL: http://metube:8081
      ALLOW_DELETE: "false"
    volumes:
      # Must be the same folder MeTube writes into.
      - /volume1/docker/metube/downloads:/media:ro
      # Persistent PrivateTube users/settings/database.
      - /volume1/docker/private-tube/data:/data
    depends_on:
      - metube
