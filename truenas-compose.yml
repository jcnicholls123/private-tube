services:
  private-tube:
    image: ghcr.io/jcnicholls123/private-tube:latest
    container_name: private-tube
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      PORT: "3020"
      MEDIA_DIR: /media
      DATA_DIR: /data
      # Chromecast devices need a LAN-reachable URL for this app.
      PUBLIC_URL: http://TRUENAS-IP:3020
      # Change this to your MeTube WebUI URL.
      METUBE_URL: http://TRUENAS-IP:30094
      # Change these before exposing the app to your network.
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me
      # Set to "true" for one restart to force-reset the admin password, then set back to "false".
      RESET_ADMIN_PASSWORD: "false"
      # Used only to initialize the SQLite-stored cast secret.
      CAST_SECRET: change-this-too
      # Set to "true" for one restart to rotate the SQLite-stored cast secret.
      RESET_CAST_SECRET: "false"
      AUTH_ENABLED: "true"
      # Set to "true" only if you want retention rules to delete local files.
      ALLOW_DELETE: "false"
    volumes:
      # Change this to the dataset where MeTube/Pinchflat saves videos.
      - /mnt/Media/downloads/YouTube:/media:ro
      # Change this to a persistent app config dataset.
      - /mnt/Media/apps/private-tube:/data
