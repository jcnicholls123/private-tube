services:
  private-tube:
    image: ghcr.io/jcnicholls123/private-tube:latest
    container_name: private-tube
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      PORT: "3020"
      MEDIA_DIR: /media
      DATA_DIR: /data
      AUTH_ENABLED: "true"
      # Set to "true" only if you want retention rules to delete local files.
      ALLOW_DELETE: "false"
    volumes:
      # Change this to the dataset where MeTube/Pinchflat saves videos.
      - /mnt/Media/downloads/YouTube:/media:ro
      # Change this to a persistent app config dataset.
      - /mnt/Media/apps/private-tube:/data
