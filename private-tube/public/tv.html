<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrivateTube TV</title>
    <link rel="stylesheet" href="/tv.css?v=20260626-tv-player-brand">
  </head>
  <body>
    <main id="app" class="tv-shell">
      <section id="loginPanel" class="login-panel" hidden>
        <div class="brand"><span class="brand-mark"></span><span data-brand-name>PrivateTube</span></div>
        <h1>Sign in</h1>
        <input id="usernameInput" autocomplete="username" placeholder="Username">
        <input id="passwordInput" autocomplete="current-password" type="password" placeholder="Password">
        <button id="loginButton" type="button">Sign in</button>
        <p id="loginStatus"></p>
      </section>

      <section id="profilePanel" class="profile-panel" hidden>
        <div class="brand"><span class="brand-mark"></span><span data-brand-name>PrivateTube</span></div>
        <h1>Who's watching?</h1>
        <div id="profileGrid" class="profile-grid"></div>
      </section>

      <section id="libraryPanel" class="library-panel" hidden>
        <header class="tv-header">
          <div class="brand"><span class="brand-mark"></span><span data-brand-name>PrivateTube</span></div>
          <div>
            <h1 id="viewTitle">Home</h1>
            <p id="viewMeta"></p>
          </div>
        </header>
        <nav id="tabs" class="tabs">
          <button type="button" data-filter="all">Home</button>
          <button type="button" data-filter="recent">Latest</button>
          <button type="button" data-filter="channels">Channels</button>
          <button type="button" data-filter="settings">Settings</button>
        </nav>
        <div id="grid" class="tv-grid"></div>
      </section>

      <section id="playerPanel" class="player-panel" hidden>
        <video id="player" autoplay playsinline></video>
        <div id="playerOverlay" class="player-copy">
          <div class="player-main-action" id="playerAction">Pause</div>
          <div class="player-info">
            <h1 id="playerTitle"></h1>
            <p id="playerMeta"></p>
          </div>
          <div class="player-progress">
            <span id="currentTime">0:00</span>
            <div class="progress-track"><span id="progressFill"></span></div>
            <span id="durationTime">0:00</span>
          </div>
          <div class="player-hints">
            <span>OK Play/Pause</span>
            <span>Left/Right Seek</span>
            <span>Back Library</span>
          </div>
        </div>
      </section>
    </main>
    <script src="/tv.js?v=20260626-tv-player-brand"></script>
  </body>
</html>
