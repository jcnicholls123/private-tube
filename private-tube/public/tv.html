<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrivateTube TV</title>
    <link rel="stylesheet" href="/tv.css?v=20260626-profiles-cleanup-tv-next">
  </head>
  <body>
    <main id="app" class="tv-shell">
      <section id="startupPanel" class="startup-panel">
        <div class="startup-logo">
          <span class="brand-mark"></span>
          <strong data-brand-name>PrivateTube</strong>
        </div>
      </section>

      <section id="offlinePanel" class="offline-panel" hidden>
        <div class="brand"><span class="brand-mark"></span><span data-brand-name>PrivateTube</span></div>
        <h1>Disconnected</h1>
        <p id="offlineStatus">PrivateTube is not reachable from this TV.</p>
        <button id="retryButton" class="focus-card settings-action" type="button">Retry</button>
      </section>

      <section id="loginPanel" class="login-panel" hidden>
        <div class="brand"><span class="brand-mark"></span><span data-brand-name>PrivateTube</span></div>
        <h1>Sign in</h1>
        <input id="usernameInput" autocomplete="username" placeholder="Username">
        <input id="passwordInput" autocomplete="current-password" type="password" placeholder="Password">
        <button id="loginButton" type="button">Sign in</button>
        <p id="loginStatus"></p>
      </section>

      <section id="profilePanel" class="profile-panel" hidden>
        <div class="brand"><span class="brand-mark"></span><span data-brand-name>PrivateTube</span></div>
        <h1>Who's watching?</h1>
        <div id="profileGrid" class="profile-grid"></div>
      </section>

      <section id="libraryPanel" class="library-panel" hidden>
        <header class="tv-header">
          <div class="brand"><span class="brand-mark"></span><span data-brand-name>PrivateTube</span></div>
          <div>
            <h1 id="viewTitle">Home</h1>
            <p id="viewMeta"></p>
          </div>
        </header>
        <nav id="tabs" class="tabs">
          <button type="button" data-filter="all">Home</button>
          <button type="button" data-filter="recent">Latest</button>
          <button type="button" data-filter="channels">Channels</button>
          <button type="button" data-action="refresh">Refresh</button>
          <button type="button" data-filter="settings">Settings</button>
        </nav>
        <div id="grid" class="tv-grid"></div>
      </section>

      <section id="playerPanel" class="player-panel" hidden>
        <video id="player" autoplay playsinline></video>
        <div id="playerOverlay" class="player-copy">
          <div class="player-main-action" id="playerAction" aria-label="Pause">
            <span class="player-action-icon"></span>
          </div>
          <div class="player-info">
            <h1 id="playerTitle"></h1>
            <p id="playerMeta"></p>
          </div>
          <div id="playerQuality" class="quality-chip">WEBM</div>
          <div class="player-transport">
            <button id="previousVideoButton" class="focus-card transport-button" type="button" aria-label="Previous video"><span class="transport-icon previous"></span><span>Previous</span></button>
            <button id="nextVideoButton" class="focus-card transport-button" type="button" aria-label="Next video"><span class="transport-icon next"></span><span>Next</span></button>
          </div>
          <div class="player-progress">
            <span id="currentTime">0:00</span>
            <div class="progress-track"><span id="progressFill"></span></div>
            <span id="durationTime">0:00</span>
          </div>
          <div class="player-hints">
            <span>OK Play/Pause</span>
            <span>Left/Right Seek</span>
            <span>Next marks watched</span>
            <span>Back Library</span>
          </div>
        </div>
        <div id="upNextOverlay" class="up-next-overlay" hidden>
          <section class="up-next-card">
            <div class="up-next-count">
              <span id="upNextCount">5</span>
            </div>
            <div class="up-next-copy">
              <p>Up next</p>
              <h1 id="upNextTitle"></h1>
              <span id="upNextMeta"></span>
            </div>
            <div id="upNextThumb" class="up-next-thumb"></div>
            <div class="up-next-actions">
              <button id="playNextButton" class="focus-card up-next-button primary" type="button">Play now</button>
              <button id="cancelNextButton" class="focus-card up-next-button" type="button">Cancel</button>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="/tv.js?v=20260626-profiles-cleanup-tv-next"></script>
  </body>
</html>
