<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set up - PrivateTube</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PrivateTube">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <section class="login-overlay">
      <form class="login-box setup-box" method="post" action="/form-setup">
        <div class="login-brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>PrivateTube</span>
        </div>
        <h1>Set up your library</h1>
        <input name="username" autocomplete="username" placeholder="Admin username" value="admin" required>
        <input name="password" autocomplete="new-password" type="password" placeholder="Admin password" required>
        <input name="metubeUrl" type="url" placeholder="MeTube URL, e.g. http://10.69.24.3:30094">
        <input name="publicUrl" type="url" placeholder="Cast URL, blank for auto">
        <button type="submit">Create admin</button>
        <a class="text-link" href="/login.html">Sign in instead</a>
        <p id="setupStatus"></p>
      </form>
    </section>
    <script>
      const error = new URLSearchParams(location.search).get("error");
      if (error) {
        document.querySelector("#setupStatus").textContent =
          error === "missing" ? "Username and password are required" : "Setup failed. Check container logs.";
      }
    </script>
    <script src="/pwa.js" type="module"></script>
  </body>
</html>
