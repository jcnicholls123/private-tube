<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watch - PrivateTube</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PrivateTube">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="PrivateTube home">
        <span class="brand-mark">PT</span>
        <span>PrivateTube</span>
      </a>
      <label class="search">
        <span class="sr-only">Search videos</span>
        <input id="searchInput" type="search" placeholder="Search your library">
      </label>
    </header>

    <main class="watch-layout">
      <section class="player-panel">
        <video id="player" controls autoplay playsinline x-webkit-airplay="allow"></video>
        <div class="player-actions">
          <button id="castButton" class="secondary-button" type="button" disabled>Cast</button>
          <button id="airplayButton" class="secondary-button" type="button" hidden>AirPlay</button>
          <span id="castStatus"></span>
        </div>
        <h1 id="videoTitle"></h1>
        <a id="channelLink" class="channel-link" href="/"></a>
      </section>
      <aside>
        <h2>Up next</h2>
        <div id="relatedGrid" class="related-list"></div>
      </aside>
    </main>

    <script src="/pwa.js" type="module"></script>
    <script src="/watch.js" type="module"></script>
  </body>
</html>
