<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrivateTube</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PrivateTube">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="/styles.css?v=20260626-shorts-menu-profiles">
  </head>
  <body>
    <header class="topbar">
      <button id="menuButton" class="menu-button" type="button" aria-label="Open menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <a class="brand" href="/" aria-label="PrivateTube home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span data-brand-name>PrivateTube</span>
      </a>
      <label class="search">
        <span class="sr-only">Search videos</span>
        <input id="searchInput" type="search" placeholder="Search your library">
      </label>
    </header>

    <div id="menuBackdrop" class="menu-backdrop" hidden></div>
    <aside id="appMenu" class="app-menu" hidden aria-label="PrivateTube menu">
      <div class="menu-head">
        <span class="brand-mark" aria-hidden="true"></span>
        <strong data-brand-name>PrivateTube</strong>
        <button id="menuCloseButton" class="menu-close" type="button" aria-label="Close menu">Close</button>
      </div>
      <div class="menu-section">
        <span>Browse</span>
        <button class="menu-item" type="button" data-menu-filter="all"><i class="menu-icon home"></i><span>Home</span></button>
        <button class="menu-item" type="button" data-menu-filter="recent"><i class="menu-icon latest"></i><span>Latest</span></button>
        <button class="menu-item" type="button" data-menu-filter="shorts"><i class="menu-icon shorts"></i><span>Shorts</span></button>
        <button class="menu-item" type="button" data-menu-filter="channels"><i class="menu-icon channels"></i><span>Channels</span></button>
      </div>
      <div class="menu-section admin-only">
        <span>Manage</span>
        <button class="menu-item" type="button" data-menu-filter="subscriptions"><i class="menu-icon subscriptions"></i><span>Subscriptions</span></button>
        <button class="menu-item" type="button" data-menu-filter="users"><i class="menu-icon users"></i><span>Users</span></button>
        <button class="menu-item" type="button" data-menu-filter="settings"><i class="menu-icon settings"></i><span>Settings</span></button>
      </div>
      <div class="menu-section">
        <span>Actions</span>
        <button id="profileButton" class="menu-item" type="button"><i class="menu-icon profile"></i><span>Switch profile</span></button>
        <button id="rescanButton" class="menu-item" type="button"><i class="menu-icon rescan"></i><span>Rescan library</span></button>
        <button id="logoutButton" class="menu-item danger" type="button"><i class="menu-icon logout"></i><span>Log out</span></button>
      </div>
      <section id="downloadStatus" class="download-status menu-download-status" hidden>
        <div>
          <strong>Download activity</strong>
          <span id="downloadStatusText">No recent downloads</span>
        </div>
        <div id="downloadActivityList" class="download-activity-list"></div>
      </section>
    </aside>

    <main class="shell">
      <aside class="sidebar">
        <nav class="side-nav" aria-label="Main navigation">
          <button class="nav-item active" type="button" data-filter="all"><span class="nav-dot"></span><span>Home</span></button>
          <button class="nav-item" type="button" data-filter="recent"><span class="nav-dot"></span><span>Latest</span></button>
          <button class="nav-item" type="button" data-filter="shorts"><span class="nav-dot"></span><span>Shorts</span></button>
          <button class="nav-item" type="button" data-filter="channels"><span class="nav-dot"></span><span>Channels</span></button>
        </nav>
        <div class="add-panel">
          <form id="addForm">
            <label for="urlInput">Add a video</label>
            <div class="add-row">
              <input id="urlInput" type="url" placeholder="YouTube URL">
              <button type="submit">Add</button>
            </div>
            <select id="qualitySelect" aria-label="Download quality"></select>
            <p id="qualityInfo" class="quality-info"></p>
            <p id="addStatus"></p>
          </form>
        </div>
      </aside>

      <section class="content" aria-live="polite">
        <section id="continueSection" class="continue-section" hidden>
          <div class="section-title compact">
            <h2>Continue watching</h2>
            <p id="continueMeta"></p>
          </div>
          <div id="continueGrid" class="continue-grid"></div>
        </section>
        <div class="section-title">
          <h1 id="viewTitle">Home</h1>
          <p id="viewMeta"></p>
        </div>
        <div id="channelStrip" class="channel-strip"></div>
        <div id="grid" class="video-grid"></div>
        <div id="adminPanel" class="admin-panel" hidden></div>
        <div id="emptyState" class="empty-state" hidden>
          <h2>No videos found</h2>
          <p>Once MeTube or a mounted library saves videos here, they will appear on this page.</p>
        </div>
      </section>
    </main>
    <div id="toastStack" class="toast-stack" aria-live="polite"></div>

    <script src="/pwa.js" type="module"></script>
    <script src="/app.js?v=20260626-shorts-menu-profiles" type="module"></script>
  </body>
</html>
