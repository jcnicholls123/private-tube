<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrivateTube</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="PrivateTube home">
        <span class="brand-mark">PT</span>
        <span>PrivateTube</span>
      </a>
      <label class="search">
        <span class="sr-only">Search videos</span>
        <input id="searchInput" type="search" placeholder="Search your library">
      </label>
      <button id="rescanButton" class="icon-button" type="button" title="Rescan library">⟳</button>
      <button id="logoutButton" class="icon-button" type="button" title="Log out">Exit</button>
    </header>

    <section id="loginOverlay" class="login-overlay" hidden>
      <form id="loginForm" class="login-box">
        <h1>PrivateTube</h1>
        <input id="loginUsername" autocomplete="username" placeholder="Username">
        <input id="loginPassword" autocomplete="current-password" type="password" placeholder="Password">
        <button type="submit">Sign in</button>
        <p id="loginStatus"></p>
      </form>
    </section>

    <section id="setupOverlay" class="login-overlay" hidden>
      <form id="setupForm" class="login-box">
        <h1>Set up PrivateTube</h1>
        <input id="setupUsername" autocomplete="username" placeholder="Admin username" value="admin">
        <input id="setupPassword" autocomplete="new-password" type="password" placeholder="Admin password">
        <input id="setupMetubeUrl" type="url" placeholder="MeTube URL, e.g. http://10.69.24.3:30094">
        <input id="setupPublicUrl" type="url" placeholder="Cast URL, blank for auto">
        <button type="submit">Create admin</button>
        <button id="setupLoginButton" class="secondary-button" type="button">Sign in instead</button>
        <p id="setupStatus"></p>
      </form>
    </section>

    <main class="shell">
      <aside class="sidebar">
        <button class="nav-item active" type="button" data-filter="all">Home</button>
        <button class="nav-item" type="button" data-filter="recent">Latest</button>
        <button class="nav-item" type="button" data-filter="channels">Channels</button>
        <button class="nav-item admin-only" type="button" data-filter="subscriptions">Subscriptions</button>
        <button class="nav-item admin-only" type="button" data-filter="users">Users</button>
        <button class="nav-item admin-only" type="button" data-filter="settings">Settings</button>
        <div class="add-panel">
          <form id="addForm">
            <label for="urlInput">Add a video</label>
            <div class="add-row">
              <input id="urlInput" type="url" placeholder="YouTube URL">
              <button type="submit">Add</button>
            </div>
            <select id="qualitySelect" aria-label="Download quality"></select>
            <p id="addStatus"></p>
          </form>
        </div>
      </aside>

      <section class="content" aria-live="polite">
        <div class="section-title">
          <h1 id="viewTitle">Home</h1>
          <p id="viewMeta"></p>
        </div>
        <div id="channelStrip" class="channel-strip"></div>
        <div id="grid" class="video-grid"></div>
        <div id="adminPanel" class="admin-panel" hidden></div>
        <div id="emptyState" class="empty-state" hidden>
          <h2>No videos found</h2>
          <p>Once MeTube or a mounted library saves videos here, they will appear on this page.</p>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
