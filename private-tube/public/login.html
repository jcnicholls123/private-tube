<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in - PrivateTube</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PrivateTube">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="/styles.css?v=20260625-channels-v3">
  </head>
  <body>
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("pt-theme") || "dark";
    </script>
    <section class="login-overlay">
      <form class="login-box" method="post" action="/form-login">
        <div class="login-brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>PrivateTube</span>
        </div>
        <h1>Sign in</h1>
        <input name="username" autocomplete="username" placeholder="Username" required>
        <input name="password" autocomplete="current-password" type="password" placeholder="Password" required>
        <button type="submit">Sign in</button>
        <p id="fallbackStatus"></p>
      </form>
    </section>
    <script>
      if (new URLSearchParams(location.search).has("error")) {
        document.querySelector("#fallbackStatus").textContent = "Invalid username or password";
      }
    </script>
    <script src="/pwa.js" type="module"></script>
  </body>
</html>
