<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrivateTube TV</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="screen">
      <section class="panel">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <span>PrivateTube TV</span>
        </div>
        <h1>Open TV mode</h1>
        <p id="introText">Use your internal PrivateTube address. This app opens the TV UI with its own player, not Chromecast.</p>
        <label>
          <span>Internal PrivateTube URL</span>
          <input id="serverUrl" type="url" placeholder="http://10.69.24.3:3020" autofocus>
        </label>
        <div class="actions">
          <button id="openButton" type="button">Open</button>
          <button id="saveButton" type="button">Save</button>
          <button id="changeButton" type="button">Change</button>
        </div>
        <p id="status" class="status"></p>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
