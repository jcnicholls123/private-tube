<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrivateTube TV</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="screen">
      <section class="panel">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <span>NichTube TV</span>
        </div>
        <div class="launch-meter" aria-hidden="true">
          <span id="countdownRing" style="--progress: 100%"><strong id="countdownText">3</strong></span>
        </div>
        <h1 id="headline">Opening TV mode</h1>
        <p id="introText">Saved server loaded. Use Open now, or change the address before launch.</p>
        <label>
          <span>Server URL</span>
          <input id="serverUrl" type="url" placeholder="http://10.69.24.3:3020" autofocus>
        </label>
        <div class="actions">
          <button id="openButton" type="button">Open</button>
          <button id="changeButton" type="button">Change</button>
          <button id="saveButton" type="button">Save</button>
          <button id="clearButton" type="button">Clear</button>
        </div>
        <p id="status" class="status"></p>
        <p class="version">v0.1.1</p>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
