services:
  private-tube:
    build: .
    container_name: private-tube
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      PORT: "3020"
      MEDIA_DIR: /media
      DATA_DIR: /data
      PUBLIC_URL: http://TRUENAS-IP:3020
      # Optional: set this to your MeTube URL to submit downloads from the sidebar.
      # METUBE_URL: http://TRUENAS-IP:30094
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me
      CAST_SECRET: change-this-too
      AUTH_ENABLED: "true"
      ALLOW_DELETE: "false"
    volumes:
      # TrueNAS: change this to the folder where MeTube/Pinchflat stores videos.
      - /mnt/Media/downloads/YouTube:/media:ro
      - /mnt/Media/apps/private-tube:/data
